name: run

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '10 16 * * *'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run checkin
        run: npm run main
        env:
          GLADOS: ${{ secrets.GLADOS }}
          NOTIFY: ${{ secrets.NOTIFY }}

      - name: Keep repo active
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .heartbeat
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .heartbeat
          git commit -m "chore: keep workflow active" || echo "No changes to commit"
          git push
